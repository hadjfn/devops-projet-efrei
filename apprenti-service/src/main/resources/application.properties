spring.application.name=apprenti-service
server.port=8080

# PostgreSQL (configurable via variables d'environnement pour Docker Compose)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/apprentis}
spring.datasource.username=${DB_USER:apprentis}
spring.datasource.password=${DB_PASSWORD:apprentis}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# URL du microservice stats (consommé par apprenti-service)
stats.service.url=${STATS_SERVICE_URL:http://localhost:8081}

# Logging
logging.level.faria.sasikumar.sylla=INFO
